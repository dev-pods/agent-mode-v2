# Workflow: Step 2 - Verificação de Build e Dependências
#
# Função: Verifica se a aplicação consegue instalar suas dependências e ser buildada
# sem erros. Isso serve como proxy para validar que os alunos conseguiram
# executar "npm install" e "npm run dev" localmente. Executar o servidor de
# desenvolvimento interativo em CI não é viável, então usamos o build como
# confirmação de que a aplicação é executável.
#
# Gatilho: push na branch build-agent-mode
# Verificações:
#   - npm ci funciona no backend (instala dependências sem erros)
#   - npm ci funciona no frontend (instala dependências sem erros)
#   - npm run build funciona no backend (compila sem erros)
#   - npm run build funciona no frontend (compila sem erros)

name: Step 2 # Verificação de Build - Dependências e Compilação

on:
  push:
    branches:
      - "build-agent-mode"

# Este workflow começa desabilitado e é habilitado automaticamente pelo Step 1
concurrency:
  group: step-2-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_3_FILE: ".github/steps/3-agents.md"

jobs:
  # Job 1: Localiza a issue de progresso criada pelo Step 0
  find_exercise:
    name: Encontrar Issue do Exercício
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.7.0

  # Job 2: Instala dependências e executa o build de ambos os projetos
  check_step_work:
    name: Verificar build de backend e frontend
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Fazer Checkout
        uses: actions/checkout@v4

      - name: Obter templates de resposta
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Encontrar último comentário
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Atualizar comentário - verificando trabalho
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      # INÍCIO: Verificações da Etapa 2

      # Instala dependências do backend usando npm ci (install limpo via lock file)
      - name: Instalar dependências do backend (npm ci)
        id: check-backend-install
        continue-on-error: true
        run: |
          cd backend
          npm ci

      # Instala dependências do frontend usando npm ci
      - name: Instalar dependências do frontend (npm ci)
        id: check-frontend-install
        continue-on-error: true
        run: |
          cd frontend
          npm ci

      # Executa o build do backend para validar que o código compila sem erros
      - name: Executar build do backend (npm run build)
        id: check-backend-build
        continue-on-error: true
        run: |
          cd backend
          npm run build

      # Executa o build do frontend para validar que o código compila sem erros
      - name: Executar build do frontend (npm run build)
        id: check-frontend-build
        continue-on-error: true
        run: |
          cd frontend
          npm run build

      # Posta a tabela de resultados na issue
      - name: Atualizar comentário - resultados da etapa
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "npm ci no backend executou com sucesso"
                passed: ${{ steps.check-backend-install.outcome == 'success' }}
              - description: "npm ci no frontend executou com sucesso"
                passed: ${{ steps.check-frontend-install.outcome == 'success' }}
              - description: "npm run build no backend executou com sucesso"
                passed: ${{ steps.check-backend-build.outcome == 'success' }}
              - description: "npm run build no frontend executou com sucesso"
                passed: ${{ steps.check-frontend-build.outcome == 'success' }}

      # FIM: Verificações da Etapa 2

      - name: Falhar job se verificações não passaram
        if: |
          steps.check-backend-install.outcome == 'failure' ||
          steps.check-frontend-install.outcome == 'failure' ||
          steps.check-backend-build.outcome == 'failure' ||
          steps.check-frontend-build.outcome == 'failure'
        run: exit 1

  # Job 3: Posta o conteúdo da Etapa 3 e habilita o próximo workflow
  post_next_step_content:
    name: Postar conteúdo da próxima etapa
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Fazer Checkout
        uses: actions/checkout@v4

      - name: Obter templates de resposta
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      - name: Criar comentário - etapa finalizada
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 3

      - name: Criar comentário - adicionar conteúdo da etapa
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_3_FILE }}

      - name: Criar comentário - observando progresso
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Desabilitar workflow atual e habilitar o próximo
        run: |
          gh workflow disable "${{ github.workflow }}"
          gh workflow enable "Step 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
